name: NBA Daily Report

permissions:
  contents: write

on:
  schedule:
    - cron: "30 0 * * *"   # 台灣 08:30 初盤觀察
    - cron: "30 6 * * *"   # 台灣 14:30 傷兵更新版
    - cron: "30 12 * * *"  # 台灣 20:30 晚間觀察
    - cron: "30 21 * * *"  # 台灣 05:30 最終版
    - cron: "30 23 * * *"  # 台灣 07:30 開賽前更新
  workflow_dispatch:

concurrency:
  group: nba-report
  cancel-in-progress: true

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        run: python daily_report_v3.py

      - name: Commit daily report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add -f reports/*.html
          git add -f data/*.csv

          git commit -m "Auto update NBA report" || echo "No changes to commit"

          git push
