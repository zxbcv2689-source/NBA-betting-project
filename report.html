
<html>
<head>
    <meta charset="UTF-8">
    <title>NBA 預測報告</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        .header {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .game {
            margin-bottom: 20px;
        }
        .confidence-high {
            color: red;
            font-weight: bold;
        }
        .confidence-mid {
            color: orange;
            font-weight: bold;
        }
        .confidence-low {
            color: gray;
            font-weight: bold;
        }
        .time {
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">📊 NBA 預測報告（2026-04-24）</div>
    <div class="card">
    <div style="font-size:20px; font-weight:bold;">📊 昨日戰績</div>
    <div>找不到昨日預測資料</div>
</div>
    <div class="card">
        <div style="font-size:20px; font-weight:bold;">🔥 明日推薦</div>

        <div class="game">
            <div class="confidence-high">⭐ 首推（信心 37）</div>
            <div>New York Knicks vs Atlanta Hawks</div>
            <div>→ 大分 216.5 </div>
            <div class="time">開賽時間：2026-04-24 07:10</div>
        </div>
        
        <div class="game">
            <div class="confidence-low">🔹 次推（信心 22）</div>
            <div>Denver Nuggets vs Minnesota Timberwolves</div>
            <div>→ 小分 234.5 </div>
            <div class="time">開賽時間：2026-04-24 09:30</div>
        </div>
        
    </div>
</div>

</body>
</html>
